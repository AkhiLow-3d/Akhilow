<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>akhiLowのホームページ</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: sans-serif;
      line-height: 1.7;
      background: #ffffff;
      color: #111111;
      max-width: 900px;
      margin-inline: auto;
    }
    h1, h2 {
      margin-top: 0;
    }
    .box {
      border: 1px solid #999;
      padding: 16px;
      margin-bottom: 20px;
    }
    img {
      max-width: 100%;
      height: auto;
      border: 1px solid #999;
    }
    ul {
      padding-left: 20px;
    }
    a {
      color: blue;
    }
  </style>
</head>
<body>
  <h1>akhiLowのホームページ</h1>

  <div class="box">
    <p>Blenderで3Dモデルを制作しています。</p>
    <p>家具、小物、部屋、背景アセットなどを作っています。</p>
  </div>

  <div class="box">
    <h2>作品</h2>
    <ul>
      <li>和風の部屋</li>
      <li>生活感ある家具シリーズ</li>
      <li>小物・背景アセット</li>
    </ul>
  </div>

  <div class="box">
    <h2>リンク</h2>
    <ul>
      <li><a href="#">BOOTH</a></li>
      <li><a href="#">FAB</a></li>
      <li><a href="#">X</a></li>
    </ul>
  </div>

  <div class="box">
    <h2>連絡</h2>
    <p>制作・公開情報はXで更新予定です。</p>
  </div>
</body>
</html>
